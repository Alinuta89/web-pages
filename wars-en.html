<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian Wars — Speed Run (English)</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --deep-navy: #0B1F33;
  --midnight-blue: #102A43;
  --teal-core: #0FB9B1;
  --aqua-light: #4FD1C5;
  --slate-blue: #1E3A5F;
  --white: #FFFFFF;
  --card-bg: #132D45;
  --glow: rgba(15,185,177,0.25);
}

html { font-size: 16px; }
body {
  font-family: 'Lato', sans-serif;
  background: var(--deep-navy);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── STICK FIGURES ── */
.stickman {
  display: inline-block;
  position: relative;
}
.stickman svg {
  width: 60px;
  height: 80px;
}
.stickman svg .body { stroke: var(--aqua-light); stroke-width: 2.5; fill: none; stroke-linecap: round; }
.stickman svg .head { fill: var(--aqua-light); }
.stickman svg .sword { stroke: #FFB432; stroke-width: 2; fill: none; stroke-linecap: round; }
.stickman svg .flag-pole { stroke: var(--white); stroke-width: 1.5; fill: none; }
.stickman svg .flag-fr { fill: #5B8DEF; }
.stickman svg .flag-gb { fill: #FF6464; }
.stickman svg .hat { fill: var(--teal-core); }

/* stick fight animation */
@keyframes swordSwing {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-35deg); }
  50% { transform: rotate(15deg); }
  75% { transform: rotate(-20deg); }
}
@keyframes bobble {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes runCycle {
  0% { transform: translateX(0); }
  50% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}
@keyframes wave {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-15deg); }
  75% { transform: rotate(15deg); }
}
@keyframes floatUp {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-8px) rotate(-3deg); }
  66% { transform: translateY(-4px) rotate(3deg); }
}
@keyframes deadFlop {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(90deg); }
}
@keyframes shipRock {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
@keyframes cannonFire {
  0%, 90%, 100% { transform: translateX(0); }
  95% { transform: translateX(-4px); }
}
@keyframes explosion {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.8; }
  100% { transform: scale(1.5); opacity: 0; }
}

.scene-battle {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
  padding: 1rem 0;
  min-height: 100px;
}
.scene-battle .fighter-left {
  animation: runCycle 0.6s ease infinite;
}
.scene-battle .fighter-right {
  animation: runCycle 0.6s ease infinite reverse;
}
.scene-battle .sword-arm {
  transform-origin: 50% 0%;
  animation: swordSwing 0.8s ease infinite;
}
.scene-battle .sword-arm-r {
  transform-origin: 50% 0%;
  animation: swordSwing 0.8s ease infinite 0.4s;
}

.scene-ship {
  display: flex;
  justify-content: center;
  padding: 1rem 0;
}
.scene-ship svg {
  animation: shipRock 2s ease infinite;
}

.scene-deport {
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 1rem 0;
}
.scene-deport .sad-stick {
  animation: bobble 1.5s ease infinite;
}
.scene-deport .sad-stick:nth-child(2) { animation-delay: 0.3s; }
.scene-deport .sad-stick:nth-child(3) { animation-delay: 0.6s; }

.scene-climb {
  display: flex;
  justify-content: center;
  padding: 1rem 0;
}
.scene-climb .climber {
  animation: floatUp 2s ease infinite;
}

.scene-peace {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 1rem 0;
}
.scene-peace .waver {
  animation: wave 1.5s ease infinite;
}

.scene-pontiac {
  display: flex;
  justify-content: center;
  padding: 1rem 0;
}
.scene-pontiac .angry-chief {
  animation: bobble 0.5s ease infinite;
}

/* splash stick fight */
.splash-scene {
  position: relative;
  width: 280px;
  height: 110px;
  margin: 0 auto 1.5rem;
}
.splash-scene .fr-fighter {
  position: absolute;
  left: 40px;
  bottom: 0;
  animation: runCycle 0.6s ease infinite;
}
.splash-scene .gb-fighter {
  position: absolute;
  right: 40px;
  bottom: 0;
  animation: runCycle 0.6s ease infinite reverse;
}
.splash-scene .vs-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.8rem;
  font-weight: 700;
  color: #FFB432;
  text-shadow: 0 0 20px rgba(255,180,50,0.4);
  animation: bobble 1s ease infinite;
}

/* ── SPLASH ── */
#splash {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  padding: 2rem;
  background: linear-gradient(135deg, #0B1F33 0%, #102A43 40%, #1E3A5F 100%);
}
#splash h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(90deg, var(--teal-core), var(--aqua-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#splash .subtitle {
  font-weight: 300;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 1.5rem;
  max-width: 440px;
  line-height: 1.6;
}
#splash .stats-row {
  display: flex;
  gap: 2rem;
  margin-bottom: 2.5rem;
}
#splash .stat-item { text-align: center; }
#splash .stat-num {
  font-size: 2rem;
  font-weight: 700;
  color: var(--teal-core);
}
#splash .stat-label {
  font-weight: 300;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-start {
  background: var(--teal-core);
  color: var(--deep-navy);
  border: none;
  padding: 1rem 3rem;
  font-family: 'Lato', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.btn-start:hover {
  background: var(--aqua-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--glow);
}

/* ── TOP BAR ── */
#topbar {
  display: none;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,31,51,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(79,209,197,0.15);
  padding: 0.75rem 1.5rem;
  align-items: center;
  justify-content: space-between;
}
#topbar.visible { display: flex; }
.progress-wrap {
  flex: 1;
  margin: 0 1rem;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal-core), var(--aqua-light));
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}
.level-badge {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--teal-core);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.xp-counter {
  font-size: 0.8rem;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
}

/* ── LEARN PHASE ── */
#learn-phase { display: none; padding: 1.5rem; max-width: 700px; margin: 0 auto; }
#learn-phase.visible { display: block; }

.level-header {
  text-align: center;
  margin-bottom: 2rem;
  padding-top: 1rem;
}
.level-header .level-num {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--teal-core);
  margin-bottom: 0.5rem;
}
.level-header h2 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 0.3rem;
}
.level-header .level-desc {
  font-weight: 300;
  font-size: 0.9rem;
  color: rgba(255,255,255,0.5);
}

/* CARD */
.card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 1.8rem;
  margin-bottom: 1.5rem;
  border: 1px solid rgba(79,209,197,0.08);
  position: relative;
  animation: cardIn 0.35s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.card .card-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 0.25rem 0.6rem;
  border-radius: 4px;
  margin-bottom: 1rem;
}
.card .card-tag.fact { background: rgba(15,185,177,0.15); color: var(--teal-core); }
.card .card-tag.analogy { background: rgba(79,209,197,0.15); color: var(--aqua-light); }
.card .card-tag.key { background: rgba(255,180,50,0.15); color: #FFB432; }
.card .card-tag.perspective { background: rgba(147,130,255,0.15); color: #9382FF; }
.card .card-tag.consequence { background: rgba(255,100,100,0.15); color: #FF6464; }

.card h3 {
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 0.7rem;
  line-height: 1.35;
}
.card p, .card li {
  font-weight: 300;
  font-size: 0.95rem;
  line-height: 1.65;
  color: rgba(255,255,255,0.8);
}
.card ul { list-style: none; padding: 0; }
.card li { padding: 0.3rem 0; padding-left: 1.2rem; position: relative; }
.card li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--teal-core);
}
.card .analogy-box {
  background: rgba(15,185,177,0.06);
  border-left: 3px solid var(--teal-core);
  padding: 0.8rem 1rem;
  margin-top: 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  font-weight: 400;
  color: rgba(255,255,255,0.85);
}
.card .analogy-box .emoji { font-size: 1.1rem; margin-right: 0.4rem; }

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1rem;
  gap: 1rem;
}
.btn-nav {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--white);
  padding: 0.7rem 1.5rem;
  font-family: 'Lato', sans-serif;
  font-size: 0.85rem;
  font-weight: 400;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-nav:hover { border-color: var(--teal-core); color: var(--teal-core); }
.btn-nav.primary {
  background: var(--teal-core);
  border-color: var(--teal-core);
  color: var(--deep-navy);
  font-weight: 700;
}
.btn-nav.primary:hover { background: var(--aqua-light); border-color: var(--aqua-light); }
.page-indicator {
  font-size: 0.8rem;
  font-weight: 300;
  color: rgba(255,255,255,0.4);
}

/* ── QUIZ PHASE ── */
#quiz-phase { display: none; padding: 1.5rem; max-width: 700px; margin: 0 auto; }
#quiz-phase.visible { display: block; }

.quiz-header { text-align: center; padding: 2rem 0 1.5rem; }
.quiz-header h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
.quiz-header .quiz-sub { font-weight: 300; color: rgba(255,255,255,0.5); font-size: 0.9rem; }

.quiz-card {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
  border: 1px solid rgba(79,209,197,0.08);
  animation: cardIn 0.35s ease;
}
.quiz-card .q-num {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--teal-core);
  margin-bottom: 0.8rem;
}
.quiz-card .q-text {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  line-height: 1.4;
}
.quiz-card .options { display: flex; flex-direction: column; gap: 0.6rem; }
.option-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  padding: 0.9rem 1.2rem;
  font-family: 'Lato', sans-serif;
  font-size: 0.9rem;
  font-weight: 400;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  line-height: 1.4;
}
.option-btn:hover:not(.locked) {
  border-color: var(--teal-core);
  background: rgba(15,185,177,0.06);
}
.option-btn.correct {
  border-color: var(--teal-core);
  background: rgba(15,185,177,0.15);
  color: var(--teal-core);
}
.option-btn.wrong {
  border-color: #FF6464;
  background: rgba(255,100,100,0.1);
  color: #FF6464;
}
.option-btn.locked { cursor: default; opacity: 0.5; }
.option-btn.locked.correct { opacity: 1; }

.feedback-box {
  margin-top: 1rem;
  padding: 0.8rem 1rem;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 400;
  line-height: 1.5;
  animation: cardIn 0.25s ease;
}
.feedback-box.correct-fb {
  background: rgba(15,185,177,0.08);
  border-left: 3px solid var(--teal-core);
  color: rgba(255,255,255,0.85);
}
.feedback-box.wrong-fb {
  background: rgba(255,100,100,0.08);
  border-left: 3px solid #FF6464;
  color: rgba(255,255,255,0.85);
}

/* ── RESULTS ── */
#results-phase { display: none; padding: 2rem; max-width: 600px; margin: 0 auto; text-align: center; }
#results-phase.visible { display: block; }

.results-card {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 3rem 2rem;
  margin-top: 2rem;
  border: 1px solid rgba(79,209,197,0.1);
}
.score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 1.5rem;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--teal-core);
}
.results-msg {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.results-sub {
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
  margin-bottom: 2rem;
  line-height: 1.6;
}
.results-actions { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }

/* fun confetti for results */
@keyframes confettiFall {
  0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  z-index: 200;
  pointer-events: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 500px) {
  .card, .quiz-card { padding: 1.3rem; }
  #splash .stats-row { gap: 1rem; }
  .splash-scene { width: 220px; }
  .splash-scene .fr-fighter { left: 10px; }
  .splash-scene .gb-fighter { right: 10px; }
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <h1>Wars in Canada</h1>
  <p class="subtitle">Speed run your Unit 5. Learn the key points, then prove you actually know them. No cap.</p>

  <!-- Stick figure battle scene -->
  <div class="splash-scene">
    <!-- French fighter -->
    <div class="fr-fighter">
      <svg width="60" height="100" viewBox="0 0 60 100">
        <circle cx="30" cy="12" r="8" class="head" fill="#5B8DEF"/>
        <!-- beret -->
        <ellipse cx="30" cy="6" rx="10" ry="3" fill="#5B8DEF"/>
        <line x1="30" y1="20" x2="30" y2="55" class="body" stroke="#5B8DEF"/>
        <!-- legs -->
        <line x1="30" y1="55" x2="18" y2="80" class="body" stroke="#5B8DEF"/>
        <line x1="30" y1="55" x2="42" y2="80" class="body" stroke="#5B8DEF"/>
        <!-- back arm -->
        <line x1="30" y1="30" x2="15" y2="45" class="body" stroke="#5B8DEF"/>
        <!-- sword arm -->
        <g class="sword-arm" style="transform-origin: 30px 30px;">
          <line x1="30" y1="30" x2="50" y2="20" class="body" stroke="#5B8DEF"/>
          <line x1="50" y1="20" x2="58" y2="8" stroke="#FFB432" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <!-- flag on back -->
        <line x1="22" y1="25" x2="22" y2="5" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <rect x="8" y="5" width="14" height="8" rx="1" fill="#5B8DEF" opacity="0.6"/>
      </svg>
    </div>
    <div class="vs-text">VS</div>
    <!-- British fighter -->
    <div class="gb-fighter">
      <svg width="60" height="100" viewBox="0 0 60 100">
        <circle cx="30" cy="12" r="8" class="head" fill="#FF6464"/>
        <!-- top hat -->
        <rect x="22" y="0" width="16" height="8" rx="2" fill="#FF6464"/>
        <rect x="18" y="7" width="24" height="3" rx="1" fill="#FF6464"/>
        <line x1="30" y1="20" x2="30" y2="55" class="body" stroke="#FF6464"/>
        <line x1="30" y1="55" x2="18" y2="80" class="body" stroke="#FF6464"/>
        <line x1="30" y1="55" x2="42" y2="80" class="body" stroke="#FF6464"/>
        <line x1="30" y1="30" x2="45" y2="45" class="body" stroke="#FF6464"/>
        <g class="sword-arm-r" style="transform-origin: 30px 30px;">
          <line x1="30" y1="30" x2="10" y2="20" class="body" stroke="#FF6464"/>
          <line x1="10" y1="20" x2="2" y2="8" stroke="#FFB432" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <line x1="38" y1="25" x2="38" y2="5" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <rect x="38" y="5" width="14" height="8" rx="1" fill="#FF6464" opacity="0.6"/>
      </svg>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">Levels</div></div>
    <div class="stat-item"><div class="stat-num">15</div><div class="stat-label">Minutes</div></div>
    <div class="stat-item"><div class="stat-num">15</div><div class="stat-label">Questions</div></div>
  </div>
  <button class="btn-start" onclick="startLearn()">Let's Go</button>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <span class="level-badge" id="topLevelBadge">Level 1</span>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
  <span class="xp-counter" id="xpCounter">0 XP</span>
</div>

<!-- LEARN PHASE -->
<div id="learn-phase"></div>

<!-- QUIZ PHASE -->
<div id="quiz-phase"></div>

<!-- RESULTS -->
<div id="results-phase"></div>

<script>
// ─── SVG SCENE GENERATORS ───

function svgStickman(color, accessories = '') {
  return `<svg width="50" height="75" viewBox="0 0 50 75">
    <circle cx="25" cy="10" r="7" fill="${color}"/>
    ${accessories}
    <line x1="25" y1="17" x2="25" y2="45" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="45" x2="14" y2="68" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="45" x2="36" y2="68" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="10" y2="38" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="25" x2="40" y2="38" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}

function sceneBattle() {
  return `<div class="scene-battle">
    <div class="fighter-left">
      <svg width="70" height="90" viewBox="0 0 70 90">
        <circle cx="25" cy="12" r="8" fill="#5B8DEF"/>
        <ellipse cx="25" cy="6" rx="10" ry="3" fill="#5B8DEF"/>
        <line x1="25" y1="20" x2="25" y2="50" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="25" y1="50" x2="14" y2="78" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="25" y1="50" x2="36" y2="78" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round"/>

// ─── STATE ───
let xp = 0;
let currentLevel = 0;
let currentCard = 0;
let totalCards = levels.reduce((s,l) => s + l.cards.length, 0);
let cardsViewed = 0;
let quizIdx = 0;
let score = 0;
let quizAnswered = false;

// ─── HELPERS ───
function $(id) { return document.getElementById(id); }
function updateProgress() {
  const pct = ((cardsViewed) / totalCards) * 100;
  $('progressFill').style.width = Math.min(pct, 100) + '%';
  $('topLevelBadge').textContent = 'Level ' + (currentLevel + 1);
  $('xpCounter').textContent = xp + ' XP';
}

// ─── SPLASH → LEARN ───
function startLearn() {
  $('splash').style.display = 'none';
  $('topbar').classList.add('visible');
  $('learn-phase').classList.add('visible');
  renderLevel();
}

// ─── RENDER LEVEL ───
function renderLevel() {
  const level = levels[currentLevel];
  const card = level.cards[currentCard];
  const isFirst = currentLevel === 0 && currentCard === 0;
  const isLast = currentLevel === levels.length - 1 && currentCard === level.cards.length - 1;

  let html = '';
  // level header (only on first card of level)
  if (currentCard === 0) {
    html += `<div class="level-header">
      <div class="level-num">Level ${level.num} / ${levels.length}</div>
      <h2>${level.title}</h2>
      <p class="level-desc">${level.desc}</p>
    </div>`;
    // scene animation
    if (level.scene) {
      html += level.scene();
    }
  }

  // card
  html += `<div class="card">
    <span class="card-tag ${card.tag}">${card.tagLabel}</span>
    <h3>${card.title}</h3>
    ${card.bodyHtml ? card.bodyHtml : `<p>${card.body}</p>`}
    ${card.analogy ? `<div class="analogy-box"><span class="emoji">${card.analogy.slice(0,2)}</span>${card.analogy.slice(2)}</div>` : ''}
  </div>`;

  // nav
  const totalCardGlobal = levels.slice(0, currentLevel).reduce((s,l)=>s+l.cards.length,0) + currentCard + 1;
  html += `<div class="nav-row">
    <button class="btn-nav" onclick="prevCard()" ${isFirst ? 'style="visibility:hidden"' : ''}>← Back</button>
    <span class="page-indicator">${totalCardGlobal} / ${totalCards}</span>
    <button class="btn-nav primary" onclick="nextCard()">${isLast ? 'Start the Quiz →' : 'Next →'}</button>
  </div>`;

  $('learn-phase').innerHTML = html;
  updateProgress();
}

function nextCard() {
  cardsViewed++;
  xp += 10;
  const level = levels[currentLevel];
  if (currentCard < level.cards.length - 1) {
    currentCard++;
    renderLevel();
  } else if (currentLevel < levels.length - 1) {
    currentLevel++;
    currentCard = 0;
    renderLevel();
  } else {
    $('learn-phase').classList.remove('visible');
    $('learn-phase').style.display = 'none';
    startQuiz();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    renderLevel();
  } else if (currentLevel > 0) {
    currentLevel--;
    currentCard = levels[currentLevel].cards.length - 1;
    renderLevel();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── QUIZ ───
function startQuiz() {
  $('quiz-phase').classList.add('visible');
  $('topLevelBadge').textContent = 'Quiz';
  $('progressFill').style.width = '100%';
  renderQuiz();
}

function renderQuiz() {
  const q = quizQuestions[quizIdx];
  let html = '';
  if (quizIdx === 0) {
    html += `<div class="quiz-header">
      <h2>Challenge — Prove You Know It</h2>
      <p class="quiz-sub">15 questions. Each correct answer = 20 XP. No pressure. (okay maybe a little)</p>
    </div>`;
  }
  html += `<div class="quiz-card" id="qCard">
    <div class="q-num">Question ${quizIdx + 1} / ${quizQuestions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="qOpts">
      ${q.opts.map((o, i) => `<button class="option-btn" onclick="answer(${i})">${o}</button>`).join('')}
    </div>
    <div id="qFeedback"></div>
  </div>`;
  html += `<div class="nav-row">
    <span></span>
    <span class="page-indicator">${quizIdx + 1} / ${quizQuestions.length}</span>
    <button class="btn-nav primary" id="quizNext" onclick="nextQuiz()" style="visibility:hidden">Next →</button>
  </div>`;
  $('quiz-phase').innerHTML = html;
}

function answer(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const btns = document.querySelectorAll('#qOpts .option-btn');
  btns.forEach((b, i) => {
    b.classList.add('locked');
    if (i === q.correct) b.classList.add('correct');
    if (i === idx && idx !== q.correct) b.classList.add('wrong');
  });
  const isCorrect = idx === q.correct;
  if (isCorrect) { score++; xp += 20; }
  $('xpCounter').textContent = xp + ' XP';

  const funCorrect = ["Nailed it! 🎯", "Big brain energy! 🧠", "Sheeeesh! ✨", "You're actually cracked at this! 💪", "W. Just W. 🏆"];
  const funWrong = ["Oof, not quite! 😅", "Close but no beaver pelt! 🦫", "The French are disappointed. 🥖", "Montcalm shakes his head. 💀", "Yikes, but you'll get the next one! 🫡"];

  const funMsg = isCorrect
    ? funCorrect[Math.floor(Math.random() * funCorrect.length)]
    : funWrong[Math.floor(Math.random() * funWrong.length)];

  $('qFeedback').innerHTML = `<div class="feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
    ${funMsg} ${q.explain}
  </div>`;
  document.getElementById('quizNext').style.visibility = 'visible';
}

function nextQuiz() {
  quizAnswered = false;
  quizIdx++;
  if (quizIdx < quizQuestions.length) {
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

// ─── CONFETTI ───
function spawnConfetti() {
  const colors = ['#0FB9B1', '#4FD1C5', '#5B8DEF', '#FFB432', '#FF6464', '#9382FF'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (4 + Math.random() * 8) + 'px';
    el.style.height = (4 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animation = `confettiFall ${2 + Math.random() * 3}s ease ${Math.random() * 2}s forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// ─── RESULTS ───

  $('results-phase').classList.add('visible');

        <line x1="40" y1="48" x2="28" y2="65" stroke="var(--aqua-light)" stroke-width="2.5" stroke-linecap="round"/>

    msg = "🔄 Let's Run It Back";
    sub = "No stress — redo the speed run and quiz. You'll improve fast. Everyone starts somewhere.";
    stickScene = `<div style="text-align:center;margin-bottom:1rem;">
      <svg width="80" height="70" viewBox="0 0 80 70">
        <circle cx="40" cy="15" r="9" fill="rgba(255,255,255,0.4)"/>
        <line x1="40" y1="24" x2="40" y2="48" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="48" x2="28" y2="65" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="48" x2="52" y2="65" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="34" x2="25" y2="42" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="40" y1="34" x2="55" y2="28" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
        <text x="55" y="24" font-size="10">🤷</text>
      </svg>
    </div>`;
  }

  $('results-phase').innerHTML = `
    <div class="results-card">
      ${stickScene}
      <div class="score-ring">

          <circle cx="70" cy="70" r="58" fill="none" stroke="var(--teal-core)" stroke-width="8"

      <div class="results-actions">
        <button class="btn-nav" onclick="location.reload()">Start Over</button>
        <button class="btn-nav primary" onclick="reviewMistakes()">Review Material</button>
      </div>
    </div>`;
}

function reviewMistakes() {
  xp = 0; cardsViewed = 0; currentLevel = 0; currentCard = 0; score = 0; quizIdx = 0;
  $('results-phase').classList.remove('visible');
  $('results-phase').style.display = 'none';
  $('topbar').classList.add('visible');
  $('learn-phase').style.display = '';
  $('learn-phase').classList.add('visible');
  renderLevel();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
